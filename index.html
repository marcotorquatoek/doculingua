<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuLingua</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--white:#fff;--dark:#0f172a;--brand:#2563eb;--brand2:#1d4ed8;
  --green:#16a34a;--yellow:#b45309;--red:#dc2626;--purple:#7c3aed;--gray:#94a3b8;
  --border:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --green-bg:#dcfce7;--yellow-bg:#fef3c7;--red-bg:#fee2e2;--purple-bg:#ede9fe;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LAYOUT */
#app{height:100vh;overflow:hidden;display:flex;flex-direction:column}
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:var(--dark);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.s-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1e3a8a,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;flex-shrink:0}
.sidebar-logo span{color:#fff;font-weight:800;font-size:15px}
.sidebar-role{padding:16px 20px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3)}
.sidebar-nav{flex:1;padding:8px}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;text-align:left;color:rgba(255,255,255,.5);background:transparent;transition:.15s;margin-bottom:2px}
.nav-btn:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-btn.active{background:var(--brand);color:#fff}

/* MOBILE TOPBAR */
.mobile-topbar{display:none;background:var(--dark);padding:12px 16px;align-items:center;justify-content:space-between;flex-shrink:0}
.mobile-topbar .m-logo{display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;font-size:14px}
.hamburger{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:6px;border-radius:6px}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
.mobile-drawer{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--dark);z-index:201;display:flex;flex-direction:column;transform:translateX(-100%);transition:.25s}
.mobile-drawer.open{transform:translateX(0)}

/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.page{display:none;padding:24px}
.page.active{display:block}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:var(--dark)}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--white);border-radius:12px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid}
.kpi-value{font-size:28px;font-weight:800;line-height:1}
.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:8px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* LANG STATS */
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.lang-card{background:var(--white);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.lang-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lang-flag{font-size:24px}
.lang-name{font-weight:800;font-size:13px}
.lang-sub{font-size:11px;color:var(--text3)}
.lang-pct{font-size:20px;font-weight:800;margin-left:auto}
.lang-bar-wrap{background:#f1f5f9;border-radius:99px;height:6px;overflow:hidden}
.lang-bar{height:100%;border-radius:99px;transition:.4s}
.lang-stats-row{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin-top:6px}

/* FILTERS */
.filters-bar{background:var(--white);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filters-bar input,.filters-bar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--white);color:var(--text)}
.filters-bar input{flex:1;min-width:160px}
.filters-bar input:focus,.filters-bar select:focus{border-color:var(--brand)}
.clear-btn{background:none;border:none;color:var(--brand);font-size:12px;font-weight:700;cursor:pointer}

/* TABLE */
.table-wrap{background:var(--white);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:#f8fafc;border-bottom:2px solid var(--border);white-space:nowrap;text-align:left}
tbody td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}
.table-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.completed{background:var(--green-bg);color:var(--green)}
.badge.in_progress{background:var(--yellow-bg);color:var(--yellow)}
.badge.outdated{background:var(--purple-bg);color:var(--purple)}
.badge.missing{background:var(--red-bg);color:var(--red)}

/* STATUS SELECT */
.status-sel{border:none;border-radius:99px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;outline:none}
.status-sel.completed{background:var(--green-bg);color:var(--green)}
.status-sel.in_progress{background:var(--yellow-bg);color:var(--yellow)}
.status-sel.outdated{background:var(--purple-bg);color:var(--purple)}
.status-sel.missing{background:var(--red-bg);color:var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.15s}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-blue{background:var(--brand);color:#fff}.btn-blue:hover{background:var(--brand2)}
.btn-gray{background:#f1f5f9;color:var(--text2)}.btn-gray:hover{background:var(--border)}
.btn-ghost{background:transparent;color:var(--text3)}.btn-ghost:hover{background:#f1f5f9}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:520px;box-shadow:0 25px 50px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:none;border:none;font-size:22px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:6px}.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:6px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--white);color:var(--text);font-family:inherit}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--brand)}
.form-field textarea{resize:vertical;min-height:60px}
.error-msg{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;font-size:12px;padding:10px 14px;border-radius:8px;margin-top:8px}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.tab-content{display:none}.tab-content.active{display:block}

/* MOBILE CARDS */
.doc-cards{display:none;flex-direction:column;gap:12px}
.doc-card{background:var(--white);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.doc-card-name{font-weight:700;font-size:14px;color:var(--dark);line-height:1.3}
.doc-card-cat{font-size:11px;color:var(--text3);margin-top:3px}
.doc-card-ver{font-family:monospace;font-size:11px;background:#f1f5f9;padding:3px 8px;border-radius:5px;font-weight:700;flex-shrink:0}
.doc-card-langs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.lang-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700}
.progress-wrap{flex:1}
.progress-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--text3)}
.progress-bar-bg{background:#f1f5f9;border-radius:99px;height:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:99px}

/* DETAIL MODAL */
.status-choice{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid;transition:.15s}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .mobile-topbar{display:flex}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .lang-grid{grid-template-columns:1fr 1fr}
  .table-wrap .table-scroll table{display:none}
  .doc-cards{display:flex}
  .page{padding:16px}
  .page-title{font-size:18px}
}
@media(max-width:480px){
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#1e3a8a,#3b82f6);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff">D</div>
  <div class="spinner"></div>
  <div style="color:rgba(255,255,255,.5);font-size:13px">Caricamento dati…</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- MOBILE TOPBAR -->
  <div class="mobile-topbar">
    <div class="m-logo">
      <div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#1e3a8a,#3b82f6);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff">D</div>
      DocuLingua
    </div>
    <button class="hamburger" onclick="toggleDrawer()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
  </div>

  <!-- MOBILE DRAWER -->
  <div class="mobile-overlay" id="mob-overlay" onclick="toggleDrawer()"></div>
  <div class="mobile-drawer" id="mob-drawer">
    <div style="padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="s-icon">D</div>
        <span style="color:#fff;font-weight:800">DocuLingua</span>
      </div>
      <button onclick="toggleDrawer()" style="background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:22px;line-height:1">×</button>
    </div>
    <div style="padding:12px 20px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3)">Menu</div>
    <div class="sidebar-nav" id="mob-nav"></div>
  </div>

  <div class="layout">
    <!-- DESKTOP SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="s-icon">D</div>
        <span>DocuLingua</span>
      </div>
      <div class="sidebar-role">Gestione Traduzioni</div>
      <div class="sidebar-nav" id="desktop-nav"></div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="page-header">
          <div>
            <div class="page-title">Dashboard</div>
            <div class="page-sub">Monitoraggio traduzioni documentazione tecnica</div>
          </div>
          <button class="btn btn-blue" onclick="openDocModal(null)">+ Nuovo documento</button>
        </div>
        <div class="kpi-grid" id="kpi-grid"></div>
        <div class="lang-grid" id="lang-grid"></div>
        <div class="tabs">
          <button class="tab active" onclick="switchTab('tab-docs','tab-bylang',this)">📋 Documenti</button>
          <button class="tab" onclick="switchTab('tab-bylang','tab-docs',this)">🌍 Per lingua</button>
        </div>
        <div class="tab-content active" id="tab-docs">
          <div class="filters-bar">
            <input type="text" id="search-input" placeholder="🔍 Cerca documento…" oninput="renderTable()">
            <select id="filter-cat" onchange="renderTable()">
              <option value="">Tutte le categorie</option>
            </select>
            <select id="filter-status" onchange="renderTable()">
              <option value="">Tutti gli stati</option>
              <option value="missing">✗ Mancante</option>
              <option value="in_progress">⏳ In corso</option>
              <option value="outdated">↻ Obsoleta</option>
              <option value="completed">✓ Completata</option>
            </select>
            <select id="sort-key" onchange="renderTable()">
              <option value="default">📋 Ordine originale (Excel)</option>
              <option value="cat_asc">📁 Categoria A→Z</option>
              <option value="cat_desc">📁 Categoria Z→A</option>
              <option value="name_asc">🔤 Nome A→Z</option>
              <option value="name_desc">🔤 Nome Z→A</option>
              <option value="date_desc">📅 Data più recente</option>
              <option value="date_asc">📅 Data meno recente</option>
            </select>
            <button class="clear-btn" onclick="clearFilters()">✕ Azzera</button>
          </div>
          <div class="table-wrap">
            <div class="table-scroll">
              <table>
                <thead><tr>
                  <th>Documento</th><th>Categoria</th><th>Ver.</th>
                  <th>🇮🇹 IT</th><th>🇬🇧 EN</th><th>🇫🇷 FR</th><th>🇩🇪 DE</th>
                  <th>%</th><th>Azioni</th>
                </tr></thead>
                <tbody id="docs-tbody"></tbody>
              </table>
            </div>
            <div class="doc-cards" id="doc-cards-mobile"></div>
            <div class="table-footer" id="table-footer"></div>
          </div>
        </div>
        <div class="tab-content" id="tab-bylang">
          <div id="bylang-content"></div>
        </div>
      </div>

      <!-- STATISTICHE PER LINGUA (pagina separata) -->
      <div class="page" id="page-bylang">
        <div class="page-header">
          <div><div class="page-title">Stato per lingua</div><div class="page-sub">Documenti da tradurre per ogni lingua</div></div>
        </div>
        <div id="bylang-page-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- DOCUMENT MODAL -->
<div class="modal-overlay" id="doc-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="doc-modal-title">Nuovo documento</div>
      <button class="modal-close" onclick="closeDocModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="doc-id">
      <div class="form-field">
        <label>Nome documento *</label>
        <input type="text" id="doc-name" placeholder="es. Manuale installazione Caldaia EK200">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Categoria *</label>
          <select id="doc-cat"></select>
        </div>
        <div class="form-field">
          <label>Versione *</label>
          <input type="text" id="doc-ver" placeholder="v1">
        </div>
      </div>
      <div class="form-field">
        <label>Descrizione / Data</label>
        <input type="text" id="doc-desc" placeholder="es. 2025-01-15">
      </div>
      <div id="doc-modal-error" class="error-msg" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeDocModal()">Annulla</button>
      <button class="btn btn-blue" id="doc-save-btn" onclick="saveDoc()">Crea documento</button>
    </div>
  </div>
</div>

<!-- TRANSLATION DETAIL MODAL -->
<div class="modal-overlay" id="tr-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Dettaglio traduzione</div>
      <button class="modal-close" onclick="closeTrModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="tr-modal-doc-info" style="background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:16px"></div>
      <div class="form-field">
        <label>Stato traduzione</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px" id="tr-modal-status-grid"></div>
      </div>
      <div id="tr-modal-version-warn" style="display:none;background:var(--purple-bg);border:1px solid #c4b5fd;color:var(--purple);font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:12px"></div>
      <div class="form-field">
        <label>Note interne</label>
        <textarea id="tr-modal-notes" rows="3" placeholder="Aggiungi note, riferimenti, problemi…"></textarea>
      </div>
      <div id="tr-modal-updated" style="font-size:11px;color:var(--text3)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeTrModal()">Chiudi</button>
      <button class="btn btn-blue" id="tr-save-btn" onclick="saveTrModal()">Salva note</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://smhuniliucxtderrcfjc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtaHVuaWxpdWN4dGRlcnJjZmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDU1MjAsImV4cCI6MjA5MDE4MTUyMH0.gHaZxhf569rw00H7mZfJglxfpKpEAZTbUtegsXUhJCc';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const LANGS = ['IT','EN','FR','DE'];
const LANG_FLAGS = {IT:'🇮🇹',EN:'🇬🇧',FR:'🇫🇷',DE:'🇩🇪'};
const LANG_NAMES = {IT:'Italiano',EN:'English',FR:'Français',DE:'Deutsch'};
const STATUS = {
  completed:   {label:'Completata',  icon:'✓', color:'var(--green)',  bg:'var(--green-bg)'},
  in_progress: {label:'In corso',    icon:'⏳', color:'var(--yellow)', bg:'var(--yellow-bg)'},
  outdated:    {label:'Obsoleta',    icon:'↻', color:'var(--purple)', bg:'var(--purple-bg)'},
  missing:     {label:'Mancante',    icon:'✗', color:'var(--red)',    bg:'var(--red-bg)'},
};
const CATEGORIES = ["Allarmi", "Area Riservata", "Bollettini Tecnici - Modifiche prodotti", "Caldaie EK", "Camini a legna", "Circolari Vecchie", "Comandi remoti", "Componenti", "Corsi", "Documentazione tecnica", "Domoklima", "Dropbox", "Elettronica", "Parametri e Banche Dati", "Recapiti/Procedure"];

let allDocs = [];
let allTranslations = [];
let currentTrRow = null;

// ── UTILS ─────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function badge(status) {
  const s = STATUS[status] || {label:status,icon:'–',color:'var(--gray)',bg:'#f1f5f9'};
  return `<span class="badge ${status}">${s.icon} ${s.label}</span>`;
}
function pctColor(p) {
  return p===100?'var(--green)':p>=60?'var(--brand)':p>=30?'var(--yellow)':'var(--red)';
}
function progressBar(pct) {
  const c = pctColor(pct);
  return `<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${c}"></div></div>`;
}
function calcDocPct(docId) {
  const ts = allTranslations.filter(t => t.document_id===docId);
  if (!ts.length) return 0;
  return Math.round(ts.filter(t=>t.status==='completed').length / ts.length * 100);
}
function getTranslation(docId, lang) {
  return allTranslations.find(t => t.document_id===docId && t.language===lang);
}
function fmtDate(d) {
  if (!d) return '–';
  return new Date(d).toLocaleDateString('it-IT');
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  // populate category selects
  CATEGORIES.forEach(c => {
    document.getElementById('filter-cat').innerHTML += `<option value="${c}">${c}</option>`;
    document.getElementById('doc-cat').innerHTML += `<option value="${c}">${c}</option>`;
  });

  // build nav
  const navHtml = `
    <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')">◈ Dashboard</button>
    <button class="nav-btn" id="nav-bylang" onclick="showPage('bylang')">🌍 Per lingua</button>`;
  document.getElementById('desktop-nav').innerHTML = navHtml;
  document.getElementById('mob-nav').innerHTML = navHtml;

  await loadData();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
}

async function loadData() {
  const [{data:docs}, {data:translations}] = await Promise.all([
    sb.from('documents').select('*').order('sort_order', {ascending:true, nullsFirst:false}),
    sb.from('translations').select('*')
  ]);
  allDocs = docs || [];
  allTranslations = translations || [];
  renderDashboard();
}

// ── NAV ───────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-'+name);
  if (nb) nb.classList.add('active');
  if (name==='bylang') renderByLangPage();
  closeDrawer();
}

function switchTab(showId, hideId, btn) {
  document.getElementById(showId).classList.add('active');
  document.getElementById(hideId).classList.remove('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (showId==='tab-bylang') renderByLang();
}

// ── DASHBOARD ─────────────────────────────────────────────
function renderDashboard() {
  renderKPIs();
  renderLangGrid();
  renderTable();
}

function renderKPIs() {
  const total    = allDocs.length;
  const complete = allDocs.filter(d => calcDocPct(d.id)===100).length;
  const missing  = allDocs.filter(d => allTranslations.some(t=>t.document_id===d.id&&t.status==='missing')).length;
  const outdated = allDocs.filter(d => allTranslations.some(t=>t.document_id===d.id&&t.status==='outdated')).length;
  document.getElementById('kpi-grid').innerHTML = [
    {v:total,    l:'Documenti totali', s:'archivio IT master',       c:'#3b82f6'},
    {v:complete, l:'Completi',         s:'100% tutte le lingue',     c:'#16a34a'},
    {v:missing,  l:'Con mancanze',     s:'almeno 1 lingua assente',  c:'#dc2626'},
    {v:outdated, l:'Versione obsoleta',s:'traduzione superata',      c:'#7c3aed'},
  ].map(k=>`<div class="kpi-card" style="border-left-color:${k.c}">
    <div class="kpi-value" style="color:${k.c}">${k.v}</div>
    <div class="kpi-label">${k.l}</div>
    <div class="kpi-sub">${k.s}</div>
  </div>`).join('');
}

function renderLangGrid() {
  document.getElementById('lang-grid').innerHTML = LANGS.map(lang => {
    const ts = allTranslations.filter(t=>t.language===lang);
    const total=ts.length, comp=ts.filter(t=>t.status==='completed').length;
    const inp=ts.filter(t=>t.status==='in_progress').length;
    const out=ts.filter(t=>t.status==='outdated').length;
    const miss=ts.filter(t=>t.status==='missing').length;
    const pct = total>0?Math.round(comp/total*100):0;
    const c = pctColor(pct);
    return `<div class="lang-card">
      <div class="lang-card-header">
        <span class="lang-flag">${LANG_FLAGS[lang]}</span>
        <div><div class="lang-name">${lang}</div><div class="lang-sub">${LANG_NAMES[lang]}</div></div>
        <div class="lang-pct" style="color:${c}">${pct}%</div>
      </div>
      <div class="lang-bar-wrap"><div class="lang-bar" style="width:${pct}%;background:${c}"></div></div>
      <div class="lang-stats-row">
        ${comp?`<span style="color:var(--green)">✓ ${comp}</span>`:''}
        ${inp?`<span style="color:var(--yellow)">⏳ ${inp}</span>`:''}
        ${out?`<span style="color:var(--purple)">↻ ${out}</span>`:''}
        ${miss?`<span style="color:var(--red)">✗ ${miss}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function getFilteredDocs() {
  const q   = document.getElementById('search-input')?.value.toLowerCase()||'';
  const cat = document.getElementById('filter-cat')?.value||'';
  const st  = document.getElementById('filter-status')?.value||'';
  const srt = document.getElementById('sort-key')?.value||'default';
  let docs = allDocs.filter(d => {
    if (cat && d.category!==cat) return false;
    if (q && !d.name.toLowerCase().includes(q) && !d.category.toLowerCase().includes(q)) return false;
    if (st && !allTranslations.some(t=>t.document_id===d.id&&t.status===st)) return false;
    return true;
  });
  if (srt==='name_asc')  return docs.slice().sort((a,b)=>a.name.localeCompare(b.name,'it'));
  if (srt==='name_desc') return docs.slice().sort((a,b)=>b.name.localeCompare(a.name,'it'));
  if (srt==='date_desc') return docs.slice().sort((a,b)=>(b.description||'').localeCompare(a.description||''));
  if (srt==='date_asc')  return docs.slice().sort((a,b)=>(a.description||'').localeCompare(b.description||''));
  if (srt==='cat_asc')   return docs.slice().sort((a,b)=>a.category.localeCompare(b.category,'it')||a.name.localeCompare(b.name,'it'));
  if (srt==='cat_desc')  return docs.slice().sort((a,b)=>b.category.localeCompare(a.category,'it')||a.name.localeCompare(b.name,'it'));
  return docs.slice().sort((a,b)=>(a.sort_order??999)-(b.sort_order??999));
}

function renderTable() {
  const docs = getFilteredDocs();

  // Desktop tbody
  document.getElementById('docs-tbody').innerHTML = docs.map(doc => {
    const pct = calcDocPct(doc.id);
    const pc = pctColor(pct);
    const langCols = LANGS.map(l => {
      const t = getTranslation(doc.id, l);
      if (!t) return '<td>–</td>';
      if (l==='IT') return `<td>${badge('completed')}</td>`;
      const s = t.status;
      return `<td>
        <select class="status-sel ${s}" onchange="quickStatusChange('${t.id}','${doc.id}',this)">
          ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${s===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
        </select>
      </td>`;
    }).join('');
    return `<tr>
      <td>
        <div style="font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${doc.name}">${doc.name}</div>
        ${doc.description?`<div style="font-size:11px;color:var(--text3)">${doc.description}</div>`:''}
      </td>
      <td style="font-size:12px;color:var(--text2)">${doc.category}</td>
      <td><span style="font-family:monospace;font-size:11px;background:#f1f5f9;padding:3px 8px;border-radius:5px;font-weight:700">${doc.version}</span></td>
      ${langCols}
      <td>
        <div style="font-size:11px;font-weight:700;color:${pc};margin-bottom:3px">${pct}%</div>
        ${progressBar(pct)}
      </td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-gray btn-sm" onclick='openDocModal(${JSON.stringify(doc)})'>✏️ Modifica</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteDoc('${doc.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">Nessun documento trovato</td></tr>';

  // Mobile cards
  document.getElementById('doc-cards-mobile').innerHTML = docs.map(doc => {
    const pct = calcDocPct(doc.id);
    const pc = pctColor(pct);
    const pills = LANGS.map(l => {
      const t = getTranslation(doc.id,l);
      const s = t?.status||'missing';
      const sc = STATUS[s]||{};
      return `<span class="lang-pill" style="background:${sc.bg};color:${sc.color}">${LANG_FLAGS[l]} ${l} ${sc.icon}</span>`;
    }).join('');
    return `<div class="doc-card">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
        <div><div class="doc-card-name">${doc.name}</div><div class="doc-card-cat">${doc.category}</div></div>
        <span class="doc-card-ver">${doc.version}</span>
      </div>
      <div class="doc-card-langs">${pills}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div class="progress-wrap">
          <div class="progress-label"><span>Completamento</span><span style="font-weight:700;color:${pc}">${pct}%</span></div>
          ${progressBar(pct)}
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-gray btn-sm" onclick='openDocModal(${JSON.stringify(doc)})'>✏️</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteDoc('${doc.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:40px;color:var(--text3)">Nessun documento trovato</div>';

  document.getElementById('table-footer').textContent = `${docs.length} documenti su ${allDocs.length} totali`;
}

function renderByLang() {
  document.getElementById('bylang-content').innerHTML = buildByLangHTML();
}
function renderByLangPage() {
  document.getElementById('bylang-page-content').innerHTML = buildByLangHTML();
}
function buildByLangHTML() {
  return LANGS.map(lang => {
    const ts  = allTranslations.filter(t=>t.language===lang && t.status!=='completed');
    const tot = allTranslations.filter(t=>t.language===lang).length;
    const comp = tot - ts.length;
    const pct  = tot>0?Math.round(comp/tot*100):0;
    const c = pctColor(pct);
    const rows = ts.slice(0,15).map(t => {
      const doc = allDocs.find(d=>d.id===t.document_id);
      if (!doc) return '';
      return `<tr>
        <td style="font-weight:600">${doc.name}</td>
        <td style="font-size:12px;color:var(--text2)">${doc.category}</td>
        <td>${badge(t.status)}</td>
        <td style="font-size:12px;color:var(--text3)">${fmtDate(t.last_updated)}</td>
      </tr>`;
    }).join('');
    return `<div class="table-wrap" style="margin-bottom:16px">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <span style="font-size:28px">${LANG_FLAGS[lang]}</span>
        <div>
          <div style="font-weight:800;font-size:15px">${LANG_NAMES[lang]}</div>
          ${lang==='IT'?'<div style="font-size:12px;color:var(--text3)">Lingua master</div>':''}
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:22px;font-weight:800;color:${c}">${pct}%</div>
          <div style="font-size:11px;color:var(--text3)">completamento · ${comp}/${tot}</div>
        </div>
      </div>
      ${lang!=='IT' && ts.length>0 ? `
        <div class="table-scroll">
          <table><thead><tr><th>Documento</th><th>Categoria</th><th>Stato</th><th>Aggiornato</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
        ${ts.length>15?`<div style="padding:10px 16px;font-size:12px;color:var(--text3)">…e altri ${ts.length-15} documenti</div>`:''}
      ` : ''}
      ${lang==='IT'?'<div style="padding:14px 20px;color:var(--green);font-weight:600;font-size:13px">✓ Lingua master — sempre completa</div>':''}
      ${lang!=='IT'&&ts.length===0?'<div style="padding:14px 20px;color:var(--green);font-weight:600;font-size:13px">✓ Tutte le traduzioni sono complete</div>':''}
    </div>`;
  }).join('');
}

// ── STATUS CHANGE ─────────────────────────────────────────
async function quickStatusChange(trId, docId, sel) {
  const status = sel.value;
  sel.className = `status-sel ${status}`;
  await sb.from('translations').update({status, last_updated:new Date().toISOString()}).eq('id',trId);
  const t = allTranslations.find(t=>t.id===trId);
  if (t) { t.status=status; t.last_updated=new Date().toISOString(); }
  renderKPIs(); renderLangGrid();
  toast('✓ Stato aggiornato');
}

// ── DOCUMENT CRUD ─────────────────────────────────────────
function openDocModal(doc) {
  document.getElementById('doc-modal-error').style.display='none';
  if (doc) {
    document.getElementById('doc-modal-title').textContent='Modifica documento';
    document.getElementById('doc-save-btn').textContent='Salva modifiche';
    document.getElementById('doc-id').value=doc.id;
    document.getElementById('doc-name').value=doc.name;
    document.getElementById('doc-cat').value=doc.category;
    document.getElementById('doc-ver').value=doc.version;
    document.getElementById('doc-desc').value=doc.description||'';
  } else {
    document.getElementById('doc-modal-title').textContent='Nuovo documento';
    document.getElementById('doc-save-btn').textContent='Crea documento';
    document.getElementById('doc-id').value='';
    document.getElementById('doc-name').value='';
    document.getElementById('doc-ver').value='v1';
    document.getElementById('doc-desc').value='';
  }
  document.getElementById('doc-modal').classList.add('open');
}
function closeDocModal() { document.getElementById('doc-modal').classList.remove('open'); }

async function saveDoc() {
  const id   = document.getElementById('doc-id').value;
  const name = document.getElementById('doc-name').value.trim();
  const cat  = document.getElementById('doc-cat').value;
  const ver  = document.getElementById('doc-ver').value.trim();
  const desc = document.getElementById('doc-desc').value.trim();
  const errEl = document.getElementById('doc-modal-error');
  if (!name||!cat||!ver) { errEl.textContent='Compila tutti i campi obbligatori'; errEl.style.display='block'; return; }
  const btn = document.getElementById('doc-save-btn');
  btn.textContent='Salvataggio…'; btn.disabled=true;
  let error;
  if (id) {
    ({error} = await sb.from('documents').update({name,category:cat,version:ver,description:desc,updated_at:new Date().toISOString()}).eq('id',id));
  } else {
    ({error} = await sb.from('documents').insert({name,category:cat,version:ver,description:desc}));
  }
  btn.textContent=id?'Salva modifiche':'Crea documento'; btn.disabled=false;
  if (error) { errEl.textContent=error.message; errEl.style.display='block'; return; }
  closeDocModal();
  toast(id?'✓ Documento aggiornato':'✓ Documento creato');
  await loadData();
}

async function deleteDoc(id) {
  if (!confirm('Eliminare questo documento e tutte le sue traduzioni?')) return;
  await sb.from('documents').delete().eq('id',id);
  toast('✓ Documento eliminato');
  await loadData();
}

function clearFilters() {
  document.getElementById('search-input').value='';
  document.getElementById('filter-cat').value='';
  document.getElementById('filter-status').value='';
  document.getElementById('sort-key').value='default';
  renderTable();
}

// ── TRANSLATION DETAIL MODAL ──────────────────────────────
function openTrModal(trId) {
  const t = allTranslations.find(x=>x.id===trId);
  const doc = allDocs.find(d=>d.id===t?.document_id);
  if (!t||!doc) return;
  currentTrRow = t;
  document.getElementById('tr-modal-doc-info').innerHTML=`
    <div style="font-weight:700;font-size:14px;margin-bottom:6px">${doc.name}</div>
    <div style="display:flex;gap:10px;font-size:12px;color:var(--text2);flex-wrap:wrap">
      <span>📁 ${doc.category}</span>
      <span style="font-family:monospace;background:#f1f5f9;padding:2px 8px;border-radius:5px;font-weight:700">${doc.version}</span>
    </div>`;
  document.getElementById('tr-modal-status-grid').innerHTML=Object.entries(STATUS).map(([s,cfg])=>`
    <button class="status-choice" id="sc-${s}"
      style="color:${cfg.color};border-color:${t.status===s?cfg.color:'var(--border)'};background:${t.status===s?cfg.bg:'white'}"
      onclick="selectTrStatus('${s}')">
      ${cfg.icon} ${cfg.label}
    </button>`).join('');
  const vw = document.getElementById('tr-modal-version-warn');
  if (t.version && t.version!==doc.version) {
    vw.textContent=`↻ Traduzione basata su versione ${t.version}, documento ora alla ${doc.version}.`;
    vw.style.display='block';
  } else { vw.style.display='none'; }
  document.getElementById('tr-modal-notes').value=t.notes||'';
  document.getElementById('tr-modal-updated').textContent=`Aggiornato: ${new Date(t.last_updated).toLocaleString('it-IT')}`;
  document.getElementById('tr-modal').classList.add('open');
}

function selectTrStatus(s) {
  if (!currentTrRow) return;
  currentTrRow.status = s;
  Object.keys(STATUS).forEach(k => {
    const el = document.getElementById('sc-'+k);
    if (!el) return;
    const cfg = STATUS[k];
    el.style.borderColor = k===s?cfg.color:'var(--border)';
    el.style.background  = k===s?cfg.bg:'white';
  });
  sb.from('translations').update({status:s,last_updated:new Date().toISOString()}).eq('id',currentTrRow.id);
  const t = allTranslations.find(x=>x.id===currentTrRow.id);
  if(t) {t.status=s; t.last_updated=new Date().toISOString();}
  renderKPIs(); renderLangGrid(); renderTable();
  toast('✓ Stato aggiornato');
}

async function saveTrModal() {
  if (!currentTrRow) return;
  const notes = document.getElementById('tr-modal-notes').value;
  const btn = document.getElementById('tr-save-btn');
  btn.textContent='Salvataggio…'; btn.disabled=true;
  await sb.from('translations').update({notes,last_updated:new Date().toISOString()}).eq('id',currentTrRow.id);
  btn.textContent='Salva note'; btn.disabled=false;
  const t = allTranslations.find(x=>x.id===currentTrRow.id);
  if(t) t.notes=notes;
  renderTable();
  closeTrModal();
  toast('✓ Note salvate');
}
function closeTrModal() { document.getElementById('tr-modal').classList.remove('open'); currentTrRow=null; }

// ── MOBILE ────────────────────────────────────────────────
function toggleDrawer() {
  const drawer = document.getElementById('mob-drawer');
  const overlay = document.getElementById('mob-overlay');
  const open = drawer.classList.toggle('open');
  overlay.style.display = open?'block':'none';
}
function closeDrawer() {
  document.getElementById('mob-drawer').classList.remove('open');
  document.getElementById('mob-overlay').style.display='none';
}

// ── START ─────────────────────────────────────────────────
init();
</script>
</body>
</html>
